<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Booster Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #16213e);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 25px;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(45deg, #ff0000, #ff7300);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(255, 115, 0, 0.8);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 15px #ff7300;
      }
      to {
        box-shadow: 0 0 35px #ff0000;
      }
    }

    h1 {
      margin-top: 15px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .feature {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .feature:last-child {
      margin-bottom: 0;
    }

    .feature-text {
      display: flex;
      flex-direction: column;
    }

    .feature-title {
      font-size: 17px;
      font-weight: bold;
    }

    .feature-sub {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .switch {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #444;
      transition: .4s;
      border-radius: 30px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(45deg, #00ff99, #00ccff);
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .boost-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(45deg, #ff0000, #ff7300);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255, 115, 0, 0.5);
    }

    .boost-btn:hover {
      transform: scale(1.03);
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 15px;
      color: #00ff99;
      min-height: 20px;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .loader {
      width: 120px;
      height: 120px;
      border: 10px solid rgba(255,255,255,0.2);
      border-top: 10px solid #00ffcc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 30px #00ffcc;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #00ffcc;
      letter-spacing: 1px;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from {
        opacity: 0.5;
      }
      to {
        opacity: 1;
      }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 15px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #00ffcc;
    }

    .stat-label {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.7;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      opacity: 0.6;
      font-size: 13px;
    }

  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">Đang kích hoạt...</div>
</div>

<div class="container">

  <div class="header">
    <div class="logo">FF</div>
    <h1>BOOSTER PRO</h1>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-number" id="fps">60</div>
      <div class="stat-label">FPS</div>
    </div>

    <div class="stat-box">
      <div class="stat-number" id="ping">28</div>
      <div class="stat-label">PING</div>
    </div>
  </div>

  <div class="card">

    <div class="feature">
      <div class="feature-text">
        <div class="feature-title">Tăng FPS</div>
        <div class="feature-sub">Tối ưu tốc độ khung hình</div>
      </div>

      <label class="switch">
        <input type="checkbox" class="toggle-feature">
        <span class="slider"></span>
      </label>
    </div>

    <div class="feature">
      <div class="feature-text">
        <div class="feature-title">Giảm Lag</div>
        <div class="feature-sub">Ổn định kết nối game</div>
      </div>

      <label class="switch">
        <input type="checkbox" class="toggle-feature">
        <span class="slider"></span>
      </label>
    </div>

    <div class="feature">
      <div class="feature-text">
        <div class="feature-title">Tăng Độ Nhạy</div>
        <div class="feature-sub">Aim mượt hơn</div>
      </div>

      <label class="switch">
        <input type="checkbox" class="toggle-feature">
        <span class="slider"></span>
      </label>
    </div>

    <div class="feature">
      <div class="feature-text">
        <div class="feature-title">RAM Cleaner</div>
        <div class="feature-sub">Dọn dẹp bộ nhớ</div>
      </div>

      <label class="switch">
        <input type="checkbox" class="toggle-feature">
        <span class="slider"></span>
      </label>
    </div>

  </div>

  <button class="boost-btn" onclick="startBoost()">
    ⚡ KÍCH HOẠT BOOST ⚡
  </button>

  <div class="status" id="statusText"></div>

  <div class="footer">
    FF Booster Pro v2.0
  </div>

</div>

<audio id="soundOn" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
</audio>

<audio id="soundDone" preload="auto">
  <source src="https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg" type="audio/ogg">
</audio>

<script>

  const loadingScreen = document.getElementById('loadingScreen');
  const loadingText = document.getElementById('loadingText');
  const statusText = document.getElementById('statusText');

  const soundOn = document.getElementById('soundOn');
  const soundDone = document.getElementById('soundDone');

  const toggles = document.querySelectorAll('.toggle-feature');

  toggles.forEach(toggle => {
    toggle.addEventListener('change', () => {

      loadingScreen.style.display = 'flex';
      loadingText.innerText = 'Đang kích hoạt tính năng...';

      soundOn.play();

      setTimeout(() => {
        loadingScreen.style.display = 'none';

        if(toggle.checked){
          statusText.innerHTML = '✅ Đã bật tính năng thành công';
        }else{
          statusText.innerHTML = '❌ Đã tắt tính năng';
        }

      }, 1800);

    });
  });

  function startBoost(){

    loadingScreen.style.display = 'flex';
    loadingText.innerText = 'Đang tối ưu Free Fire...';

    soundOn.play();

    let fps = document.getElementById('fps');
    let ping = document.getElementById('ping');

    setTimeout(() => {

      fps.innerText = '120';
      ping.innerText = '8';

      loadingScreen.style.display = 'none';

      soundDone.play();

      statusText.innerHTML = '🚀 BOOST THÀNH CÔNG - GAME ĐÃ ĐƯỢC TỐI ƯU';

    }, 3500);

  }

</script>

</body>
</html>
